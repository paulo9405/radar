<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Análise Grátis - Radar de Tendências</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #151b2b;
            --accent-cyan: #00d4ff;
            --accent-blue: #0066ff;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .test-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .badge-success {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        .helper-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
            display: block;
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border: none;
            padding: 15px;
            font-weight: 600;
            font-size: 1.05rem;
            width: 100%;
            margin-top: 25px;
            border-radius: 12px;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 25px;
            padding: 15px 18px;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert-error, .alert-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-close {
            filter: brightness(0) invert(1);
            opacity: 0.6;
        }

        @media (max-width: 576px) {
            .test-container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .btn-analyze {
                padding: 14px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="header">
            <div class="badge-success">
                <i class="bi bi-check-circle-fill"></i>
                Sua análise grátis foi liberada
            </div>
            <h1>Digite o produto que quer analisar</h1>
            <p>Veja demanda, saturação e chance de vender antes de investir</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'market:test' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="query" class="form-label">Nome do produto</label>
                <input
                    type="text"
                    class="form-control"
                    id="query"
                    name="query"
                    placeholder="Ex: iPhone 15, Air Fryer, Luminária Sunset"
                    value="{{ query|default:'' }}"
                    maxlength="100"
                    required
                    autofocus
                >
                <small class="helper-text">
                    <i class="bi bi-info-circle"></i>
                    Digite o nome do produto como você buscaria no Google
                </small>
            </div>

            <button type="submit" class="btn btn-analyze">
                <i class="bi bi-search"></i>
                Analisar Produto Agora
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
